name: AirPodsHealthMonitor
options:
  bundleIdPrefix: com.airpodshealth
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: targeted

packages:
  CocoaMQTT:
    url: https://github.com/emqx/CocoaMQTT.git
    from: "2.1.6"

targets:
  AirPodsHealthMonitor:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: AirPodsHealthMonitor/Sources
    resources:
      - path: AirPodsHealthMonitor/Resources/Info.plist
    info:
      path: AirPodsHealthMonitor/Resources/Info.plist
      properties:
        NSHealthShareUsageDescription: "This app reads your heart rate data from AirPods Pro to display and transmit via MQTT."
        UILaunchScreen: {}
    entitlements:
      path: AirPodsHealthMonitor/Resources/AirPodsHealth.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.airpodshealth.monitor
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
        INFOPLIST_FILE: AirPodsHealthMonitor/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: AirPodsHealthMonitor/Resources/AirPodsHealth.entitlements
        DEVELOPMENT_TEAM: 5T73F3B4MF
    dependencies:
      - package: CocoaMQTT
